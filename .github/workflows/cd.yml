name: CD

# Triggered when the "CI" workflow completes on main.
# The exact workflow name "CI" must match ci.yml's `name:` field.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    # Only run when CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write  # Required to push to GHCR with GITHUB_TOKEN

    steps:
      # Check out the exact commit that CI tested — prevents a race condition
      # if a new commit lands between CI finishing and CD starting.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase repository names. This handles orgs with
      # uppercase letters in their name (standard GitHub usernames are already lowercase).
      - name: Normalise image name
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to server ─────────────────────────────────────────────────────

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      # Add the server's host key to known_hosts. The DEPLOY_HOST_KEY secret
      # must contain the output of: ssh-keyscan -H <server>
      # This avoids the insecure StrictHostKeyChecking=no approach.
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Restart service on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo systemctl restart taniwha"

      - name: Verify container is running
        run: |
          sleep 10
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker inspect --format='{{.State.Running}}' taniwha | grep -q true"
