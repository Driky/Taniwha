name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  MIX_ENV: test

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.19"
          otp-version: "27"

      # ── Cache: deps ──────────────────────────────────────────────────────────
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-

      # ── Cache: _build ────────────────────────────────────────────────────────
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-mix-build-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-build-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-

      # ── Cache: Dialyzer PLTs ─────────────────────────────────────────────────
      - name: Cache Dialyzer PLTs
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-

      # ── Quality checks ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # ── Dialyzer (MIX_ENV=dev to analyze lib/ only, not test/support) ────────
      - name: Build PLTs (first run only)
        if: steps.plt-cache.outputs.cache-hit != 'true'
        env:
          MIX_ENV: dev
        run: mix dialyzer --plt

      - name: Run Dialyzer
        env:
          MIX_ENV: dev
        run: mix dialyzer --format github

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run tests
        run: mix test
